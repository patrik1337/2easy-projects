<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Esports Briefing — 2easy.gg</title>
<meta name="description" content="Daily esports briefing: roster moves, industry news, and headlines. Updated automatically every day." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #15171a;
    --ink-soft: #5a6068;
    --paper: #fbfbfa;
    --line: #e6e6e2;
    --accent: #ff5900;
    --mono: "JetBrains Mono", monospace;
    --col-gap: 40px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Inter", -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .wrap-wide { max-width: 1200px; margin: 0 auto; padding: 0 28px; }
  .wrap-narrow { max-width: 720px; margin: 0 auto; padding: 0 28px; }

  /* ── Header ── */
  header { padding: 28px 0; border-bottom: 1px solid var(--line); }
  header .wrap-wide { display: flex; justify-content: space-between; align-items: baseline; }
  .site-mark {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-decoration: none;
  }
  .site-mark span { color: var(--accent); }
  nav a {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
    margin-left: 24px;
  }
  nav a:hover, nav a:focus-visible { color: var(--accent); }
  nav a.active { color: var(--accent); }

  /* ── Page title ── */
  .page-title {
    padding: 44px 0 36px;
    border-bottom: 1px solid var(--line);
  }
  .page-title-inner {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .page-title h1 {
    font-family: "Space Grotesk", sans-serif;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .updated-at {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  /* ── Two-column grid ── */
  .briefing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 var(--col-gap);
    align-items: start;
    padding: 0 0 64px;
  }

  .col-news {
    border-right: 1px solid var(--line);
    padding-right: var(--col-gap);
    padding-top: 36px;
  }

  .col-transfers {
    padding-top: 36px;
  }

  /* ── Column headers ── */
  .col-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }

  /* ── News sub-sections ── */
  .news-section + .news-section { margin-top: 32px; }
  .news-sublabel {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--line);
    background: var(--ink-soft);
    display: inline-block;
    padding: 1px 7px;
    border-radius: 2px;
    margin-bottom: 14px;
  }

  /* ── News items ── */
  .news-list { list-style: none; }
  .news-item {
    padding: 11px 0;
    border-bottom: 1px dashed var(--line);
  }
  .news-item:last-child { border-bottom: none; }
  .news-headline a {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    line-height: 1.4;
  }
  .news-headline a:hover, .news-headline a:focus-visible {
    color: var(--accent);
    text-decoration: underline;
  }
  .news-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 3px;
  }
  .news-source { color: var(--accent); }

  /* ── Transfer controls ── */
  .transfer-controls { margin-bottom: 20px; }

  .type-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
  }
  .type-tab {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink-soft);
    font-weight: 500;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .type-tab:hover { border-color: var(--accent); color: var(--ink); }
  .type-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .confidence-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 6px;
    background: var(--line);
    color: var(--ink-soft);
  }
  .confidence-badge.confirmed { background: var(--ink); color: var(--paper); }
  .confidence-badge.likely { background: var(--accent); color: #fff; }

  .date-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .date-tab {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink-soft);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .date-tab:hover { border-color: var(--ink-soft); color: var(--ink); }
  .date-tab.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .game-filters-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .filter-toggles {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-soft);
  }
  .filter-toggles button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    padding: 0;
    text-decoration: underline;
  }
  .filter-toggles button + button { margin-left: 8px; }

  .game-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .game-pill {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 9px;
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink-soft);
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    user-select: none;
  }
  .game-pill:hover { border-color: var(--ink-soft); color: var(--ink); }
  .game-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Transfer list ── */
  .transfer-list { list-style: none; margin-top: 20px; }
  .transfer-item {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
  }
  .transfer-item:last-child { border-bottom: none; }
  .transfer-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    padding-top: 1px;
  }
  .transfer-detail { color: var(--ink); font-size: 14px; }
  .transfer-player { font-weight: 500; }
  .transfer-player a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dotted var(--ink-soft);
  }
  .transfer-player a:hover, .transfer-player a:focus-visible {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .transfer-ref {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-soft);
    text-decoration: none;
    margin-left: 4px;
  }
  .transfer-ref:hover, .transfer-ref:focus-visible { color: var(--accent); }
  .transfer-move { color: var(--ink-soft); font-size: 13px; margin-top: 1px; }
  .transfer-game-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    background: var(--line);
    border-radius: 2px;
    padding: 1px 5px;
    margin-top: 3px;
  }

  /* ── Empty / loading / error ── */
  .state-msg {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-soft);
    padding: 32px 0;
  }
  .state-msg.error { color: #c0392b; }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 28px 0 48px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
  }

  /* ── Mobile ── */
  @media (max-width: 800px) {
    .briefing-grid {
      grid-template-columns: 1fr;
    }
    .col-news {
      border-right: none;
      border-bottom: 1px solid var(--line);
      padding-right: 0;
      padding-bottom: 36px;
    }
    nav a { margin-left: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap-wide">
    <a class="site-mark" href="/">2easy<span>.gg</span></a>
    <nav>
      <a href="/">Home</a>
      <a href="/brief" class="active">Briefing</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title wrap-wide">
    <div class="page-title-inner">
      <div>
        <p class="eyebrow">Daily digest</p>
        <h1>Esports Briefing</h1>
      </div>
      <p class="updated-at" id="updated-at">Loading…</p>
    </div>
  </div>

  <div id="content" class="wrap-wide">
    <p class="state-msg" id="loading-state">Fetching the latest from the scene…</p>
  </div>
</main>

<footer>
  <div class="wrap-wide">© 2026 Patrik Sättermon · <a href="/" style="color:inherit;text-decoration:none">2easy.gg</a></div>
</footer>

<script>
(function () {
  // ── Helpers ──────────────────────────────────────────────────────────────

  function relativeTime(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    return d === 1 ? '1d ago' : d + 'd ago';
  }

  function formatUpdated(iso) {
    if (!iso) return '';
    return 'Last updated: ' + new Date(iso).toLocaleString('en-GB', {
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Parse "YYYY-MM-DD" or ISO string to local date string "YYYY-MM-DD"
  function toDateStr(raw) {
    if (!raw) return '';
    // already YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    const d = new Date(raw);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('en-CA'); // "YYYY-MM-DD"
  }

  function todayStr() {
    return new Date().toLocaleDateString('en-CA');
  }

  function daysAgoStr(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toLocaleDateString('en-CA');
  }

  // ── State ────────────────────────────────────────────────────────────────

  let allTransfers = [];
  let allRumours = [];
  let activeType = 'transfers'; // 'transfers' | 'rumours'
  // null = show all; Set = explicit include list (empty Set = show none)
  let selectedGames = null;
  let activeDateRange = 'all'; // 'today' | '5days' | 'all'

  // ── Filter logic ─────────────────────────────────────────────────────────

  function filteredTransfers() {
    const cutoff = activeDateRange === 'today'
      ? todayStr()
      : activeDateRange === '5days'
        ? daysAgoStr(4)
        : null;

    const source = activeType === 'rumours' ? allRumours : allTransfers;
    return source.filter(t => {
      if (selectedGames !== null && !selectedGames.has(t.game)) return false;
      if (cutoff) {
        const d = toDateStr(t.date);
        if (!d || d < cutoff) return false;
      }
      return true;
    });
  }

  // ── Renderers ────────────────────────────────────────────────────────────

  function renderNews(items) {
    if (!items.length) return '<p class="state-msg">No items available.</p>';
    return '<ul class="news-list">' + items.map(i => `
      <li class="news-item">
        <div class="news-headline">
          <a href="${esc(i.link)}" target="_blank" rel="noopener noreferrer">${esc(i.title)}</a>
        </div>
        <div class="news-meta">
          <span class="news-source">${esc(i.source)}</span>${i.pubDate ? ' · ' + relativeTime(i.pubDate) : ''}
        </div>
      </li>`).join('') + '</ul>';
  }

  function renderTransferList() {
    const items = filteredTransfers();
    const el = document.getElementById('transfer-list');
    if (!el) return;
    if (!items.length) {
      const label = activeType === 'rumours' ? 'rumours' : 'transfers';
      el.innerHTML = `<p class="state-msg">No ${label} match the current filters.</p>`;
      return;
    }
    el.innerHTML = '<ul class="transfer-list">' + items.map(t => {
      const playerHTML = t.playerUrl
        ? `<a href="${esc(t.playerUrl)}" target="_blank" rel="noopener noreferrer">${esc(t.player)}</a>`
        : esc(t.player);
      const refHTML = t.refUrl
        ? ` <a class="transfer-ref" href="${esc(t.refUrl)}" target="_blank" rel="noopener noreferrer" title="Source">[ref]</a>`
        : '';
      const confHTML = t.confidence
        ? ` <span class="confidence-badge ${esc(t.confidence.toLowerCase())}">${esc(t.confidence)}</span>`
        : '';
      return `
      <li class="transfer-item">
        <span class="transfer-date">${esc(t.date)}</span>
        <span class="transfer-detail">
          <span class="transfer-player">${playerHTML}</span>${refHTML}${confHTML}
          <div class="transfer-move">${esc(t.from || '—')} → ${esc(t.to || '—')}</div>
          <span class="transfer-game-tag">${esc(t.game)}</span>
        </span>
      </li>`;
    }).join('') + '</ul>';
  }

  function renderGamePills(games) {
    return games.map(g => {
      const active = selectedGames === null || selectedGames.has(g) ? 'active' : '';
      return `<button class="game-pill ${active}" data-game="${esc(g)}">${esc(g)}</button>`;
    }).join('');
  }

  function refreshPills() {
    document.querySelectorAll('.game-pill').forEach(btn => {
      btn.classList.toggle('active', selectedGames === null || selectedGames.has(btn.dataset.game));
    });
  }

  // ── Full render after data loads ─────────────────────────────────────────

  function render(data) {
    document.getElementById('updated-at').textContent = formatUpdated(data.generatedAt);

    allTransfers = data.transfers ?? [];
    allRumours = data.rumours ?? [];
    activeType = 'transfers';
    const games = [...new Set([...allTransfers, ...allRumours].map(t => t.game))].sort();
    selectedGames = null; // null = show all

    const industry = (data.news ?? []).filter(n => n.section === 'industry');
    const headlines = (data.news ?? []).filter(n => n.section === 'headlines');

    document.getElementById('content').innerHTML = `
      <div class="briefing-grid">

        <!-- ── Left: News ── -->
        <div class="col-news">
          <p class="col-label">Esports News</p>

          <div class="news-section">
            <span class="news-sublabel">Industry</span>
            ${renderNews(industry)}
          </div>

          <div class="news-section">
            <span class="news-sublabel">Headlines</span>
            ${renderNews(headlines)}
          </div>
        </div>

        <!-- ── Right: Transfers / Rumours ── -->
        <div class="col-transfers">
          <p class="col-label" id="transfer-col-label">Roster Transfers</p>

          <div class="transfer-controls">
            <div class="type-tabs">
              <button class="type-tab active" data-type="transfers">Transfers (${allTransfers.length})</button>
              <button class="type-tab" data-type="rumours">Rumours (${allRumours.length})</button>
            </div>

            <div class="date-tabs">
              <button class="date-tab" data-range="today">Today</button>
              <button class="date-tab" data-range="5days">Last 5 days</button>
              <button class="date-tab active" data-range="all">All</button>
            </div>

            <div class="game-filters-label">
              <span>Filter by title</span>
              <span class="filter-toggles">
                <button id="btn-all">All</button>
                <button id="btn-none">None</button>
              </span>
            </div>
            <div class="game-pills" id="game-pills">
              ${renderGamePills(games)}
            </div>
          </div>

          <div id="transfer-list"></div>
        </div>

      </div>`;

    renderTransferList();
    bindEvents(games);
  }

  // ── Event binding ─────────────────────────────────────────────────────────

  function bindEvents(games) {
    // Type tabs (Transfers / Rumours)
    document.querySelectorAll('.type-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeType = btn.dataset.type;
        document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('transfer-col-label').textContent =
          activeType === 'rumours' ? 'Roster Rumours' : 'Roster Transfers';
        renderTransferList();
      });
    });

    // Date tabs
    document.querySelectorAll('.date-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeDateRange = btn.dataset.range;
        document.querySelectorAll('.date-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTransferList();
      });
    });

    // Game pills
    document.getElementById('game-pills').addEventListener('click', e => {
      const pill = e.target.closest('.game-pill');
      if (!pill) return;
      const game = pill.dataset.game;

      if (selectedGames === null) {
        // Currently showing all — deselect just this one
        selectedGames = new Set(games.filter(g => g !== game));
      } else if (selectedGames.has(game)) {
        selectedGames.delete(game);
        // If all games are now selected, collapse back to null (show all)
        if (selectedGames.size === games.length) selectedGames = null;
      } else {
        selectedGames.add(game);
        if (selectedGames.size === games.length) selectedGames = null;
      }

      refreshPills();
      renderTransferList();
    });

    // Select all / none
    document.getElementById('btn-all').addEventListener('click', () => {
      selectedGames = null;
      refreshPills();
      renderTransferList();
    });

    document.getElementById('btn-none').addEventListener('click', () => {
      selectedGames = new Set(); // empty Set = show nothing
      refreshPills();
      renderTransferList();
    });
  }

  // ── Fetch ────────────────────────────────────────────────────────────────

  fetch('/briefing.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(err => {
      document.getElementById('loading-state').className = 'state-msg error';
      document.getElementById('loading-state').textContent =
        'Could not load briefing. Please try again later.';
      document.getElementById('updated-at').textContent = '';
      console.error(err);
    });
})();
</script>

</body>
</html>
