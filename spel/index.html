<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spel – 2easy.gg</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#538d4e;--bg:#121213;--surface:#1a1a1b;--text:#fff;--border:#3a3a3c;--muted:#818384}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;min-height:100dvh;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);max-width:600px;margin:0 auto;width:100%}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:.05em}
.back-link{color:var(--text);text-decoration:none;font-size:.85rem;opacity:.7}
.logo{font-weight:800;font-size:1.1rem;letter-spacing:-.01em}
.logo span{color:var(--green)}
main{max-width:600px;margin:0 auto;padding:32px 20px}
.intro{margin-bottom:28px}
.intro h2{font-size:1.5rem;font-weight:700;margin-bottom:6px}
.intro p{color:var(--muted);font-size:.95rem;line-height:1.5}
.games-grid{display:grid;gap:12px}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:16px;transition:border-color .15s,transform .1s}
.game-card:hover{border-color:#555;transform:translateY(-1px)}
.game-card:active{transform:translateY(0)}
.game-icon{font-size:2.2rem;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:10px;flex-shrink:0}
.game-info{flex:1;min-width:0}
.game-name{font-size:1.05rem;font-weight:700;margin-bottom:3px}
.game-desc{font-size:.82rem;color:var(--muted);line-height:1.4}
.game-badge{font-size:.72rem;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap}
.badge-play{background:var(--green);color:#fff}
.badge-done{background:var(--border);color:var(--muted)}
footer{text-align:center;padding:32px 20px;color:var(--muted);font-size:.8rem}
footer a{color:var(--muted);text-decoration:none}
#name-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:.88rem}
#name-card .lbl{color:var(--muted)}
#name-card .val{font-weight:700;flex:1}
#name-card button{background:var(--border);color:var(--text);border:none;border-radius:6px;padding:6px 12px;font-size:.8rem;font-weight:700;cursor:pointer}
#name-edit{display:flex;gap:8px;flex:1}
#name-edit input{flex:1;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.88rem;outline:none}
#name-edit input:focus{border-color:var(--green)}
#name-edit .save{background:var(--green)}
#name-hint{font-size:.72rem;color:var(--muted);margin-top:6px;line-height:1.4}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:8px;font-weight:700;font-size:.85rem;opacity:0;transition:opacity .2s;z-index:300;pointer-events:none}
#toast.show{opacity:1}
.hidden{display:none}
</style>
</head>
<body>
<header>
  <a href="/" class="back-link">← 2easy.gg</a>
  <div class="logo">2easy<span>.gg</span> Spel</div>
</header>
<main>
  <div id="name-card" class="hidden"></div>
  <div class="intro">
    <h2>Spel</h2>
    <p>Tävla mot vänner och klättra på topplistan. Två spel, spela när du vill.</p>
  </div>
  <div id="games-grid" class="games-grid"></div>
</main>
<div id="toast"></div>
<footer>
  <a href="/">2easy.gg</a>
</footer>

<script>
function todaySthlm(){ return new Date().toLocaleDateString('sv-SE',{timeZone:'Europe/Stockholm'}); }

// Ordel stores per-day state under wp2_state_<date> with {done:true} when finished.
function ordelDoneToday(){
  try{ const s=JSON.parse(localStorage.getItem('wp2_state_'+todaySthlm())); return s&&s.done; }catch{ return false; }
}
// VM-Tips stores a local copy of the submitted prediction per matchId.
function vmtipsSubmittedToday(){
  try{ for(let i=0;i<localStorage.length;i++){ if(localStorage.key(i).startsWith('1x2_pred_')) return true; } }catch{}
  return false;
}
// Pricken/Rullen leave a simple per-day breadcrumb once a result is shown.
function prickenDoneToday(){
  try{ return localStorage.getItem('plats_played_'+todaySthlm())==='1'; }catch{ return false; }
}
function rullenDoneToday(){
  try{ return localStorage.getItem('quiz_played_'+todaySthlm())==='1'; }catch{ return false; }
}

const GAMES = [
  { slug:'ordle', name:'Ordel', icon:'🟩', desc:'Gissa det svenska 5-bokstavsordet på 6 försök.', done:ordelDoneToday() },
  { slug:'1x2',   name:'VM-Tips', icon:'⚽', desc:'Tippa dagens VM-match. Rätt utgång + rätt resultat ger poäng.', done:vmtipsSubmittedToday() },
  { slug:'pricken', name:'Pricken', icon:'📍', desc:'Hitta dagens stad på världskartan. Närmare pricken = mer poäng.', done:prickenDoneToday() },
  { slug:'rullen', name:'Rullen', icon:'🎬', desc:'Dagens filmquiz — 5 frågor, 12 sekunder per fråga.', done:rullenDoneToday() },
];

const grid=document.getElementById('games-grid');
GAMES.forEach(g=>{
  const a=document.createElement('a');
  a.href='/spel/'+g.slug;
  a.className='game-card';
  a.innerHTML=`
    <div class="game-icon">${g.icon}</div>
    <div class="game-info">
      <div class="game-name">${g.name}</div>
      <div class="game-desc">${g.desc}</div>
    </div>
    <span class="game-badge ${g.done?'badge-done':'badge-play'}">${g.done?'✓ Spelat':'Spela'}</span>`;
  grid.appendChild(a);
});

// ── Smeknamn (delas av VM-Tips, Pricken, Rullen — samma id, poängen följer med) ──
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function getPlayer(){ try{ return JSON.parse(localStorage.getItem('wp2_player')); }catch{ return null; } }
let toastTimer;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1800); }

function renderNameCard(){
  const player=getPlayer();
  const card=document.getElementById('name-card');
  if(!player){ card.classList.add('hidden'); return; }
  card.classList.remove('hidden');
  card.innerHTML=`<span class="lbl">Ditt smeknamn:</span><span class="val">${esc(player.name)}</span><button id="rename-btn">Byt</button>`;
  document.getElementById('rename-btn').addEventListener('click',()=>showRenameForm(player));
}
function showRenameForm(player){
  const card=document.getElementById('name-card');
  card.innerHTML=`
    <div id="name-edit">
      <input id="rename-input" value="${esc(player.name)}" maxlength="20" autocomplete="off" autocapitalize="words" spellcheck="false">
      <button class="save" id="rename-save">Spara</button>
      <button id="rename-cancel">Avbryt</button>
    </div>`;
  const inp=document.getElementById('rename-input');
  inp.focus(); inp.select();
  document.getElementById('rename-cancel').addEventListener('click',renderNameCard);
  document.getElementById('rename-save').addEventListener('click',()=>saveRename(player));
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') saveRename(player); if(e.key==='Escape') renderNameCard(); });
}
async function saveRename(player){
  const inp=document.getElementById('rename-input');
  const newName=inp.value.trim();
  if(!newName){ inp.focus(); return; }
  if(newName===player.name){ renderNameCard(); return; }
  try{
    const r=await fetch('/api/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({playerID:player.id,newName})});
    const j=await r.json();
    if(!r.ok||!j.ok){ toast(j.error||'Kunde inte byta namn'); return; }
    player.name=j.name;
    localStorage.setItem('wp2_player',JSON.stringify(player));
    toast('Namn ändrat till '+j.name+' — gäller VM-Tips, Pricken och Rullen.');
    renderNameCard();
  }catch{ toast('Nätverksfel — försök igen'); }
}
renderNameCard();
</script>
</body>
</html>
